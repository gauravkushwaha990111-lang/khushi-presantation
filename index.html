<!DOCTYPE html>
<html>
<head>
<title>Khushi Presentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#31c48d">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* --- Phone Friendly (Mobile) Styles --- */
  @media screen and (max-width: 768px) {
    body { padding: 15px; }
    .theme-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .controls-row { flex-direction: column; gap: 15px; }
    .control-box { width: 100%; margin: 0; }
    .inline-actions { flex-direction: column; align-items: stretch; gap: 12px; }
    .inline-actions button { width: 100%; margin: 0; }
    
    /* Mobile par badi slides ko fit karne ka logic */
    #preview {
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .slide {
      transform: scale(0.35); /* Slides choti dikhengi phone pe */
      transform-origin: top center;
      margin-bottom: -330px; /* Scale hone ke baad ka bacha hua space hatane ke liye */
    }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<h1>Khushi Presentation</h1>
<p class="subheading">Design, preview, and export polished worship slides in minutes.</p>

<div class="step">
<label for="pdfName"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> 1) PDF ka naam do</label>
<input id="pdfName" type="text" placeholder="example: Sunday_Worship" oninput="saveState()">
</div>

<div class="step">
<label><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="10.5" r="2.5"></circle><circle cx="8.5" cy="7.5" r="2.5"></circle><circle cx="6.5" cy="12.5" r="2.5"></circle><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.53-.21-1.04-.59-1.41-.36-.36-.59-.86-.59-1.41 0-1.38 1.12-2.5 2.5-2.5H16c3.31 0 6-2.69 6-6 0-4.97-4.48-9-10-9z"></path></svg> 2) Theme choose karo</label>
<div class="theme-grid">
<button type="button" class="theme-card active" data-theme="theme1" onclick="setTheme('theme1', this)">
<img src="themes/theme1.png" alt="Theme 1">
<span>Theme 1</span>
</button>
<button type="button" class="theme-card" data-theme="theme2" onclick="setTheme('theme2', this)">
<img src="themes/theme2.png" alt="Theme 2">
<span>Theme 2</span>
</button>
<button type="button" class="theme-card" data-theme="theme3" onclick="setTheme('theme3', this)">
<img src="themes/theme3.png" alt="Theme 3">
<span>Theme 3</span>
</button>
<button type="button" class="theme-card" data-theme="theme4" onclick="setTheme('theme4', this)">
<img src="themes/theme4.png" alt="Theme 4">
<span>Theme 4</span>
</button>
</div>
</div>

<div class="step">
<label for="lyrics"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg> 3) Text/Lyrics dalo</label>
<textarea id="lyrics" oninput="refreshPreviewIfNeeded()" placeholder="Lyrics paste karo...

Enter + Enter = new slide"></textarea>
<div class="inline-actions" style="margin-bottom: 20px; text-align: center;">
<button type="button" class="action-btn" style="background-color: #10b981;" onclick="addSlideBreak()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> Add New Slide</button>
<small style="color: #666; display: block; margin-top: 5px;">(Aapka Enter + Enter / space wala system bhi kaam karega hi)</small>
</div>
<div class="inline-actions">
<button class="action-btn" onclick="previewSlides()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> Preview Slides</button>
<button class="action-btn" onclick="downloadPDF()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download PDF</button>
<button class="action-btn secondary" onclick="resetDraft()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg> Reset Draft</button>
</div>
</div>

<div class="step controls-row">
<div class="control-box">
<label>Text Color</label>
<div id="colorPalette" class="color-palette"></div>
<div class="custom-color-row">
<span>Custom</span>
<input id="textColor" type="color" value="#ffffff" onchange="setTextColor(this.value)">
</div>
</div>
<div class="control-box">
<label for="textOpacity">Text Opacity</label>
<input id="textOpacity" type="range" min="0" max="1" step="0.05" value="1" oninput="updateOpacityValue();refreshPreviewIfNeeded()">
<span id="opacityValue">1.00</span>
</div>
</div>

<div class="step controls-row">
<div class="control-box">
<label for="fontSize">Text Size</label>
<input id="fontSize" type="range" min="24" max="96" step="2" value="48" oninput="updateFontSizeValue();refreshPreviewIfNeeded()">
<span id="fontSizeValue">48px</span>
</div>
<div class="control-box">
<label for="offsetX">Move Left/Right</label>
<input id="offsetX" type="range" min="-300" max="300" step="5" value="0" oninput="updateOffsetXValue();refreshPreviewIfNeeded()">
<span id="offsetXValue">0px</span>
</div>
<div class="control-box">
<label for="offsetY">Move Up/Down</label>
<input id="offsetY" type="range" min="-200" max="200" step="5" value="0" oninput="updateOffsetYValue();refreshPreviewIfNeeded()">
<span id="offsetYValue">0px</span>
</div>
</div>

<div class="step controls-row">
<div class="control-box">
<label for="textAlign">Text Align</label>
<select id="textAlign" onchange="refreshPreviewIfNeeded()">
<option value="left">Left</option>
<option value="center" selected>Center</option>
<option value="right">Right</option>
</select>
</div>
<div class="control-box">
<label for="autoFitText">Auto-fit Text</label>
<div class="check-row">
<input id="autoFitText" type="checkbox" checked onchange="refreshPreviewIfNeeded()">
<span>Long text ko slide me fit karo</span>
</div>
</div>
</div>

<div id="preview"></div>

<script src="script.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker
        .register("sw.js")
        .then(res => console.log("Service worker registered!"))
        .catch(err => console.log("Service worker not registered", err));
    });
  }
</script>
</body>
</html>
